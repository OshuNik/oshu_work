<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://telegram.org https://cdn.interactjs.io https://unpkg.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' fonts.googleapis.com; font-src 'self' fonts.gstatic.com; img-src 'self' data: raw.githubusercontent.com; connect-src 'self' *.supabase.co;">
  <title>oshu://work</title>
  <!-- Preload критических ресурсов для быстрого First Paint -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://lwfhtwnfqmdjwzrdznvv.supabase.co">
  
  <!-- Preload критических файлов -->
  <link rel="preload" href="style.css" as="style">
  <link rel="preload" href="config.js" as="script">
  <link rel="preload" href="constants.js" as="script">
  <link rel="preload" href="utils.min.js" as="script">
  <link rel="preload" href="state-manager.js" as="script">
  <link rel="preload" href="api-service.js" as="script">
  <link rel="preload" href="dom-manager.js" as="script">
  <link rel="preload" href="event-manager.js" as="script">
  <link rel="preload" href="vacancy-manager.js" as="script">
  <link rel="preload" href="app-controller.js" as="script">
  
  <!-- Critical CSS для быстрого First Paint -->
  <link rel="stylesheet" href="critical.css">
  
  <!-- Async CSS Loading for non-critical styles -->
  <link rel="preload" href="style.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
  
  <!-- Fonts loaded asynchronously -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@500;700&family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>

<div class="main-wrapper">
  <div class="ptr-bar"><div class="ptr-text">Потяните для обновления</div></div>
  
  <div id="main-header">
    <header class="header">
      <h1>oshu://work <small>v10.4</small></h1>
      <div id="header-actions" class="header-actions">
        <a href="favorites.html" class="header-button">★ Избранное</a>
        <a href="settings.html" class="header-button">⚙︎ Настройки</a>
      </div>
    </header>
    <div id="search-container" class="search-container">
      <div class="search-input-wrapper">
        <input type="search" id="search-input" class="search-input" placeholder="🔍 Поиск по названию, компании, зарплате...">
        <button id="search-clear-btn" class="search-clear-btn" aria-label="Очистить поиск"></button>
      </div>
    </div>
  </div>

  <main class="content" id="vacancies-content">
    <div id="vacancies-list-main" class="vacancy-list active" role="tabpanel" aria-labelledby="tab-main" aria-label="Вакансии категории: Точно твоё"></div>
    <div id="vacancies-list-maybe" class="vacancy-list" role="tabpanel" aria-labelledby="tab-maybe" aria-label="Вакансии категории: Может быть" aria-hidden="true"></div>
    <div id="vacancies-list-other" class="vacancy-list" role="tabpanel" aria-labelledby="tab-other" aria-label="Вакансии категории: Не твоё" aria-hidden="true"></div>
  </main>
</div>

<div id="loader" class="loader-container hidden">
  <div class="retro-progress-bar-outline">
    <div class="retro-progress-bar-fill"></div>
  </div>
  <div class="loader-text">Загрузка вакансий...</div>
</div>

<div id="category-tabs" class="category-tabs" role="tablist" aria-label="Категории вакансий">
    <button id="tab-main" class="tab-button main active" data-target="vacancies-list-main" data-category-name="ТОЧНО ТВОЁ" 
          role="tab" aria-selected="true" aria-controls="vacancies-list-main">
    <span class="tab-label">ТОЧНО ТВОЁ</span>
    <span id="count-main" class="tab-count">(0)</span>
  </button>
  <button id="tab-maybe" class="tab-button maybe" data-target="vacancies-list-maybe" data-category-name="МОЖЕТ БЫТЬ"
          role="tab" aria-selected="false" aria-controls="vacancies-list-maybe">
    <span class="tab-label">МОЖЕТ БЫТЬ</span>
    <span id="count-maybe" class="tab-count">(0)</span>
  </button>
  <button id="tab-other" class="tab-button other" data-target="vacancies-list-other" data-category-name="НЕ ТВОЁ"
          role="tab" aria-selected="false" aria-controls="vacancies-list-other">
    <span class="tab-label">НЕ ТВОЁ</span>
    <span id="count-other" class="tab-count">(0)</span>
  </button>
</div>

<div id="custom-confirm-overlay" class="custom-confirm-overlay hidden">
    <div class="custom-confirm-box">
    <p id="custom-confirm-text"></p>
    <div class="custom-confirm-actions">
      <button id="confirm-btn-cancel" class="custom-confirm-button" aria-label="Отменить действие">Отмена</button>
      <button id="confirm-btn-ok" class="custom-confirm-button ok" aria-label="Подтвердить действие">OK</button>
    </div>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>

<!-- Подключение общего template -->

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
// Fallback загрузка interact.js
(function() {
  function loadScript(url, callback) {
    const script = document.createElement('script');
    script.src = url;
    script.onload = () => {
      window.dispatchEvent(new CustomEvent('interactLoaded'));
      callback(true);
    };
    script.onerror = () => callback(false);
    document.head.appendChild(script);
  }

  // Пробуем разные CDN (начинаем с самого стабильного)
  const cdnUrls = [
    'https://unpkg.com/interactjs@1.10.11/dist/interact.min.js',
    'https://cdnjs.cloudflare.com/ajax/libs/interact.js/1.10.11/interact.min.js',
    'https://cdn.interactjs.io/v1.10.11/interact.min.js'
  ];

  function tryNextCdn(index = 0) {
    if (index >= cdnUrls.length) return;
    loadScript(cdnUrls[index], (success) => {
      if (!success) tryNextCdn(index + 1);
    });
  }

  tryNextCdn();
})();
</script>
<script src="template-loader.js"></script>
<script src="config.js"></script>
<script src="constants.js"></script>
<script src="utils.min.js"></script>
<script src="state-manager.js"></script>
<script src="api-service.js"></script>
<script src="dom-manager.js"></script>
<script src="event-manager.js"></script>
<script src="vacancy-manager.js"></script>
<script src="app-controller.js"></script>
<script src="swipe-handler.js"></script>
</body>
</html>
