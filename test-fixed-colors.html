<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Тест исправленных цветов</title>
  <style>
    :root {
      --background-color: #F0F0F0;
      --card-color: #FFFFFF;
      --text-color: #000000;
      --hint-color: #666666;
      --border-color: #000000;
      --accent-blue: #41A6FF;
      --accent-green: #6BCB77;
      --accent-red: #FF5C5C;
      --accent-yellow: #FFD93D;
      --box-shadow: 4px 4px 0px #000000;
      --box-shadow-pressed: 2px 2px 0px #000000;
      --font-pixel: 'Press Start 2P', monospace;
      --font-mono: 'Roboto Mono', monospace;
      --border-width: 3px;
    }

    body {
      font-family: var(--font-mono);
      background-color: var(--background-color);
      margin: 0;
      padding: 20px;
    }

    .test-section {
      margin: 40px 0;
      padding: 20px;
      border: 2px solid #000;
      border-radius: 8px;
    }

    .test-title {
      font-family: var(--font-pixel);
      font-size: 18px;
      margin-bottom: 20px;
    }

    /* Стили для Keywords tab */
    .keywords-header-card {
      background: var(--accent-blue);
      border: var(--border-width) solid var(--border-color);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: var(--box-shadow);
    }

    .keywords-window-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
    }

    .keywords-window-title {
      font-family: var(--font-pixel);
      font-size: 24px;
      font-weight: 700;
      color: white;
      text-shadow: 2px 2px 0px rgba(0, 0, 0, 0.5);
      letter-spacing: 2px;
    }

    .pixel-counter {
      display: flex;
      align-items: center;
      gap: 12px;
      font-family: var(--font-pixel);
      font-size: 16px;
      font-weight: 700;
    }

    /* Специфичные стили для Keywords tab */
    .keywords-header-card .pixel-counter .pixel-bar {
      color: #FFD93D;
      font-size: 18px;
      letter-spacing: 2px;
      text-shadow: 1px 1px 0px rgba(0, 0, 0, 0.3);
      animation: pixelPulse 3s infinite ease-in-out;
    }

    .keywords-header-card .pixel-counter .favorites-count {
      background: #FF6B6B;
      color: white;
      padding: 6px 12px;
      border: 3px solid #000;
      border-radius: 6px;
      font-size: 18px;
      font-weight: 700;
      text-shadow: 2px 2px 0px rgba(0, 0, 0, 0.5);
      box-shadow: 4px 4px 0px #000;
    }

    /* Обычные стили для избранного */
    .favorites-count {
      font-family: var(--font-pixel);
      font-size: 16px;
      font-weight: 400;
      color: var(--text-color);
      background: var(--accent-yellow);
      padding: 6px 12px;
      border: 2px solid var(--text-color);
      box-shadow: 2px 2px 0px var(--text-color);
      min-width: 40px;
      text-align: center;
    }

    /* Теги ключевых слов - желтые */
    .keyword-tag {
      background: var(--accent-yellow);
      color: var(--text-color);
      padding: 8px 12px;
      border: 3px solid var(--border-color);
      border-radius: 6px;
      font-family: var(--font-mono);
      font-size: 14px;
      font-weight: 600;
      box-shadow: 2px 2px 0px var(--border-color);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: 6px;
    }

    @keyframes pixelPulse {
      0%, 100% { 
        color: var(--accent-green);
        transform: scale(1);
      }
      50% { 
        color: var(--accent-blue);
        transform: scale(1.1);
      }
    }

    .tags-container {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 15px 0;
    }
  </style>
</head>
<body>
  <div class="test-section">
    <h2 class="test-title">1. Keywords Tab - Красный счетчик с анимацией</h2>
    <div class="keywords-header-card">
      <div class="keywords-window-header">
        <span class="keywords-window-title">КЛЮЧЕВЫЕ СЛОВА</span>
        <div class="pixel-counter">
          <span class="pixel-bar">■■■</span>
          <span class="favorites-count">5</span>
          <span class="pixel-bar">■■■</span>
        </div>
      </div>
    </div>
  </div>

  <div class="test-section">
    <h2 class="test-title">2. Избранное - Обычный желтый счетчик</h2>
    <div class="pixel-counter">
      <span class="pixel-bar">■■■</span>
      <span class="favorites-count">12</span>
      <span class="pixel-bar">■■■</span>
    </div>
  </div>

  <div class="test-section">
    <h2 class="test-title">3. Теги ключевых слов - Желтые</h2>
    <div class="tags-container">
      <div class="keyword-tag">
        <span>JavaScript</span>
        <button style="background: none; border: none; color: red; font-weight: bold;">×</button>
      </div>
      <div class="keyword-tag">
        <span>React</span>
        <button style="background: none; border: none; color: red; font-weight: bold;">×</button>
      </div>
      <div class="keyword-tag">
        <span>Node.js</span>
        <button style="background: none; border: none; color: red; font-weight: bold;">×</button>
      </div>
    </div>
  </div>
</body>
</html>
