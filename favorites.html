<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://telegram.org https://cdn.interactjs.io https://unpkg.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' fonts.googleapis.com; font-src 'self' fonts.gstatic.com; img-src 'self' data: raw.githubusercontent.com; connect-src 'self' *.supabase.co;">
  <title>Избранное</title>
  <!-- Preload критических ресурсов для быстрого First Paint -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://lwfhtwnfqmdjwzrdznvv.supabase.co">
  
  <!-- Preload критических файлов -->
  <link rel="preload" href="style.css" as="style">
  <link rel="preload" href="favorites.js" as="script">
  <link rel="preload" href="utils.min.js" as="script">
  <link rel="preload" href="config.js" as="script">
  
  <!-- Critical CSS для быстрого First Paint -->
  <link rel="stylesheet" href="critical.css">
  
  <!-- Async CSS Loading for non-critical styles -->
  <link rel="preload" href="style.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
  
  <!-- Fonts loaded asynchronously -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@500;700&family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>

<div class="main-wrapper">
  <div class="ptr-bar"><div class="ptr-text">Потяните для обновления</div></div>

  <header class="header header-centered">
    <h1>Избранное <span id="favorites-count" class="favorites-count">0</span></h1>
    <div class="header-actions">
      <a href="index.html" class="header-button">← Назад</a>
    </div>
  </header>

  <div class="search-container" id="search-container-fav">
    <div class="search-input-wrapper">
      <input type="search" id="search-input-fav" class="search-input" placeholder="🔍 Поиск по избранным вакансиям...">
      <button id="search-clear-btn-fav" class="search-clear-btn" aria-label="Очистить поиск"></button>
    </div>
  </div>

  <main class="content" id="favorites-list"></main>
</div>
  
<div id="toast-container" class="toast-container"></div>
<div id="custom-confirm-overlay" class="custom-confirm-overlay hidden">
    <div class="custom-confirm-box">
      <p id="custom-confirm-text"></p>
      <div class="custom-confirm-actions">
        <button id="confirm-btn-cancel" class="custom-confirm-button">Отмена</button>
        <button id="confirm-btn-ok" class="custom-confirm-button ok">OK</button>
      </div>
    </div>
</div>
<!-- Подключение общего template -->

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
// Fallback загрузка interact.js
(function() {
  function loadScript(url, callback) {
    const script = document.createElement('script');
    script.src = url;
    script.onload = () => {
      window.dispatchEvent(new CustomEvent('interactLoaded'));
      callback(true);
    };
    script.onerror = () => callback(false);
    document.head.appendChild(script);
  }

  // Пробуем разные CDN (начинаем с самого стабильного)
  const cdnUrls = [
    'https://unpkg.com/interactjs@1.10.11/dist/interact.min.js',
    'https://cdnjs.cloudflare.com/ajax/libs/interact.js/1.10.11/interact.min.js',
    'https://cdn.interactjs.io/v1.10.11/interact.min.js'
  ];

  function tryNextCdn(index = 0) {
    if (index >= cdnUrls.length) return;
    loadScript(cdnUrls[index], (success) => {
      if (!success) tryNextCdn(index + 1);
    });
  }

  tryNextCdn();
})();
</script>
<script src="template-loader.js"></script>
<script src="config.js"></script>
<script src="utils.min.js"></script>
<script src="swipe-handler.js"></script>
<script src="favorites.js"></script>
</body>
</html>
