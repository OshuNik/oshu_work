      </button>

        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true"><title>Добавить в избранное</title><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54z"/></svg>

            <div class="attachments" data-element="attachments"></div>
            <div data-element="full-text"></div>

      </details>
    </div>
    <div class="card-footer">
      <div class="footer-skill-tags" data-element="skills"></div>
      <div class="footer-meta">
        <span class="channel-name" data-element="channel"></span>
        <span class="meta-separator"> • </span>
        <span class="timestamp-footer" data-element="timestamp"></span>
      </div>
    </div>
  </div>
</template>

<!-- Скрипты -->
<script>
// Fallback загрузка interact.js
(function() {
  function loadScript(url, callback) {
    const script = document.createElement('script');
    script.src = url;
    script.onload = () => {
      window.dispatchEvent(new CustomEvent('interactLoaded'));
      callback(true);
    };
    script.onerror = () => callback(false);
    document.head.appendChild(script);
  }

  // Пробуем разные CDN (начинаем с самого стабильного)
  const cdnUrls = [
    'https://unpkg.com/interactjs@1.10.11/dist/interact.min.js',
    'https://cdnjs.cloudflare.com/ajax/libs/interact.js/1.10.11/interact.min.js',
    'https://cdn.interactjs.io/v1.10.11/interact.min.js'
  ];

  function tryNextCdn(index = 0) {
    if (index >= cdnUrls.length) return;
    loadScript(cdnUrls[index], (success) => {
      if (!success) tryNextCdn(index + 1);
    });
  }

  tryNextCdn();
})();
</script>
<script src="src/js/config.js"></script>
<script src="src/js/constants.js"></script>
<script src="src/js/utils.min.js"></script>
<script src="src/js/theme-manager.js"></script>
