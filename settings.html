<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://telegram.org; style-src 'self' 'unsafe-inline' fonts.googleapis.com; font-src 'self' fonts.gstatic.com; img-src 'self' data: raw.githubusercontent.com; connect-src 'self' *.supabase.co;">
  <title>Настройки</title>
  <!-- Preload критических ресурсов для быстрого First Paint -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://lwfhtwnfqmdjwzrdznvv.supabase.co">
  
  <!-- Preload критических файлов -->
  <link rel="preload" href="style.css" as="style">
  <link rel="preload" href="settings.js" as="script">
  <link rel="preload" href="utils.min.js" as="script">
  <link rel="preload" href="config.js" as="script">
  
  <!-- Critical CSS Inline - First Paint Optimization -->
  <style>
:root{--background-color:#F0F0F0;--card-color:#FFFFFF;--text-color:#000000;--border-width:2px;--border-color:#000000;--shadow-offset:4px;--box-shadow:var(--shadow-offset) var(--shadow-offset) 0px var(--border-color);--box-shadow-pressed:calc(var(--shadow-offset)/2) calc(var(--shadow-offset)/2) 0px var(--border-color);--accent-green:#6BCB77;--accent-blue:#41A6FF;--transition-fast:0.1s ease-out;--transition-normal:0.2s ease-out;--font-mono:'Roboto Mono','Courier New',monospace;--font-pixel:'Press Start 2P','Courier New',monospace}.hidden{display:none!important}body{font-family:var(--font-mono);background-color:var(--background-color);color:var(--text-color);margin:0;padding:15px;overflow-x:hidden}.main-wrapper{position:relative;z-index:1;background-color:var(--background-color);padding-bottom:80px;padding-top:20px;transition:transform 0.3s ease-out;will-change:transform}.header{padding-bottom:25px;text-align:center}.header h1{font-family:var(--font-pixel);font-size:28px;color:var(--text-color);margin:0 0 15px 0;letter-spacing:1.5px}.header-actions{display:flex;align-items:center;gap:10px;justify-content:center;position:relative}.header-button{font-size:14px;text-decoration:none;padding:10px 18px;border-radius:12px;background-color:var(--card-color);border:var(--border-width) solid var(--border-color);box-shadow:var(--box-shadow);color:var(--text-color);font-weight:700;font-family:var(--font-mono);cursor:pointer;transition:all var(--transition-fast);letter-spacing:0.5px}.header-button:active{transform:translate(calc(var(--shadow-offset)/2),calc(var(--shadow-offset)/2));box-shadow:var(--box-shadow-pressed)}.search-container{padding:0 0 15px 0}.search-input-wrapper{position:relative}.search-input{width:100%;padding:15px 50px 15px 20px;border:var(--border-width) solid var(--border-color);border-radius:12px;background-color:var(--card-color);font-family:var(--font-mono);font-size:16px;font-weight:500;color:var(--text-color);box-shadow:var(--box-shadow);outline:none;transition:all var(--transition-normal);box-sizing:border-box}.search-clear-btn{position:absolute;right:15px;top:50%;transform:translateY(-50%);width:24px;height:24px;border:none;background:none;cursor:pointer;opacity:0;transition:opacity var(--transition-normal)}.search-clear-btn::before{content:'✕';font-size:16px;color:var(--text-color);font-weight:700}.loader-container{position:fixed;top:0;left:0;right:0;bottom:0;background-color:var(--background-color);display:flex;align-items:center;justify-content:center;z-index:9999;transition:opacity 0.3s ease-out,visibility 0.3s ease-out}.loader-container.hidden{opacity:0;visibility:hidden}.ptr-bar{box-sizing:border-box;position:absolute;top:-80px;left:15px;right:15px;height:75px;display:flex;align-items:center;justify-content:center;gap:12px;background-color:var(--background-color);border:var(--border-width) solid var(--border-color);border-top:none;border-radius:0 0 12px 12px;box-shadow:var(--shadow-offset) var(--shadow-offset) 0px var(--border-color);color:var(--text-color);font-family:var(--font-mono);font-weight:700;font-size:14px;opacity:0;transition:opacity 0.2s ease-out;will-change:opacity}.ptr-bar.ptr-visible{opacity:1}
  </style>
  
  <!-- Async CSS Loading for non-critical styles -->
  <link rel="preload" href="style.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="style.css"></noscript>
  
  <!-- Fonts loaded asynchronously -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@500;700&family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>

  <header class="header header-settings">
    <h1>⚙︎ Настройки</h1>
    <div class="header-actions">
      <a href="index.html" class="header-button">← Назад</a>
      <button id="save-button" class="header-icon-btn" aria-label="Сохранить настройки">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
          <polyline points="17 21 17 13 7 13 7 21"></polyline>
          <polyline points="7 3 7 8 15 8"></polyline>
        </svg>
      </button>
    </div>
  </header>

  <div class="settings-tabs">
    <button class="settings-tab-button active" data-target="tab-keywords">Ключевые слова</button>
    <button class="settings-tab-button" data-target="tab-channels">Каналы</button>
  </div>

  <main class="content">
    <div id="tab-keywords" class="settings-tab-content active">
      <div class="current-keywords-container">
        <p class="current-keywords-label">Текущие ключевые слова:</p>
        <p id="current-keywords-display" class="current-keywords-list">Загрузка...</p>
      </div>
      <div class="settings-form">
        <label for="keywords-input">Изменить список (через запятую):</label>
        <textarea id="keywords-input" rows="5" placeholder="монтаж, рилс, анимация..."></textarea>
      </div>
    </div>

    <div id="tab-channels" class="settings-tab-content">
      <div class="settings-form">
        <button id="load-defaults-btn" class="button-load-defaults">Загрузить стандартные каналы</button>
        <label for="channel-input">Добавить новый канал:</label>
        <div class="add-channel-form">
          <input type="text" id="channel-input" placeholder="@username или https://t.me/..." aria-label="Адрес канала для добавления">
          <button id="add-channel-btn" aria-label="Добавить канал">+</button>
        </div>
        <div id="channels-list" class="channels-list"></div>
        <button id="delete-all-btn" class="button-delete">Удалить все каналы</button>
      </div>
    </div>
  </main>
  
  <div id="toast-container" class="toast-container"></div>

  <div id="custom-confirm-overlay" class="custom-confirm-overlay hidden">
    <div class="custom-confirm-box">
      <p id="custom-confirm-text"></p>
      <div class="custom-confirm-actions">
        <button id="confirm-btn-cancel" class="custom-confirm-button">Отмена</button>
        <button id="confirm-btn-ok" class="custom-confirm-button ok">OK</button>
      </div>
    </div>
  </div>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="config.js"></script>
  <script src="utils.min.js"></script>
  <script src="settings.js"></script>
</body>
</html>
