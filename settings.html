<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://telegram.org; style-src 'self' 'unsafe-inline' fonts.googleapis.com; font-src 'self' fonts.gstatic.com; img-src 'self' data: raw.githubusercontent.com; connect-src 'self' *.supabase.co;">
  <title>Настройки</title>
  <!-- Preload критических ресурсов для быстрого First Paint -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://lwfhtwnfqmdjwzrdznvv.supabase.co">
  
  <!-- Preload критических файлов -->
  <link rel="preload" href="style.css" as="style">
  <link rel="preload" href="settings.js" as="script">
  <link rel="preload" href="utils.min.js" as="script">
  <link rel="preload" href="config.js" as="script">
  
  <!-- Critical CSS для быстрого First Paint -->
  <link rel="stylesheet" href="critical.css">
  
  <!-- Async CSS Loading for non-critical styles -->
  <link rel="preload" href="style.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
  
  <!-- Fonts loaded asynchronously -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@500;700&family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>

  <header class="header header-settings">
    <h1>⚙︎ Настройки</h1>
    <div class="header-actions">
      <a href="index.html" class="header-button">← Назад</a>
      <button id="save-button" class="header-icon-btn" aria-label="Сохранить настройки">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <title>Сохранить настройки</title>
          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
          <path d="M17 21v-8H7v8M7 3v5h8"/>
        </svg>
      </button>
    </div>
  </header>

  <div class="settings-tabs">
    <button class="settings-tab-button active" data-target="tab-keywords">Ключевые слова</button>
    <button class="settings-tab-button" data-target="tab-channels">Каналы</button>
  </div>

  <main class="content">
    <div id="tab-keywords" class="settings-tab-content active">
      <div class="current-keywords-container">
        <p class="current-keywords-label">Текущие ключевые слова:</p>
        <div id="current-keywords-tags" class="keywords-tags-container">
          <div class="loading-indicator">Загрузка...</div>
        </div>
      </div>
      <div class="add-keyword-section">
        <label for="new-keyword-input">Добавить ключевое слово:</label>
        <div class="add-keyword-form">
          <input type="text" id="new-keyword-input" placeholder="например: монтаж" maxlength="30">
          <button id="add-keyword-btn" type="button">+</button>
        </div>
      </div>
      <div class="settings-form">
        <label for="keywords-input">Или изменить весь список (через запятую):</label>
        <textarea id="keywords-input" rows="4" placeholder="монтаж, рилс, анимация..."></textarea>
      </div>
    </div>

    <div id="tab-channels" class="settings-tab-content">
      <div class="settings-form">
        <button id="load-defaults-btn" class="button-load-defaults">Загрузить стандартные каналы</button>
        <label for="channel-input">Добавить новый канал:</label>
        <div class="add-channel-form">
          <input type="text" id="channel-input" placeholder="@username или https://t.me/..." aria-label="Адрес канала для добавления">
          <button id="add-channel-btn" aria-label="Добавить канал">+</button>
        </div>
        <div id="channels-list" class="channels-list"></div>
        <button id="delete-all-btn" class="button-delete">Удалить все каналы</button>
      </div>
    </div>
  </main>
  
  <div id="toast-container" class="toast-container"></div>

  <div id="custom-confirm-overlay" class="custom-confirm-overlay hidden">
    <div class="custom-confirm-box">
      <p id="custom-confirm-text"></p>
      <div class="custom-confirm-actions">
        <button id="confirm-btn-cancel" class="custom-confirm-button">Отмена</button>
        <button id="confirm-btn-ok" class="custom-confirm-button ok">OK</button>
      </div>
    </div>
  </div>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="config.js"></script>
  <script src="utils.min.js"></script>
  <script src="settings.js"></script>
</body>
</html>
