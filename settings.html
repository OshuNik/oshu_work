<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://telegram.org; style-src 'self' 'unsafe-inline' fonts.googleapis.com; font-src 'self' fonts.gstatic.com; img-src 'self' data: raw.githubusercontent.com; connect-src 'self' *.supabase.co;">
  <title>Настройки</title>
  <!-- Preload критических ресурсов для быстрого First Paint -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://lwfhtwnfqmdjwzrdznvv.supabase.co">
  
  <!-- Preload критических файлов -->
  <link rel="preload" href="style.css" as="style">
  <link rel="preload" href="settings.js" as="script">
  <link rel="preload" href="utils.min.js" as="script">
  <link rel="preload" href="config.js" as="script">
  
  <!-- Critical CSS для быстрого First Paint -->
  <link rel="stylesheet" href="critical.css">
  
  <!-- Async CSS Loading for non-critical styles -->
  <link rel="preload" href="style.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
  
  <!-- Retro Gaming Styles for Settings -->
  <link rel="stylesheet" href="retro-settings.css">
  
  <!-- Fonts loaded asynchronously -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@500;700&family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>

  <header class="header header-settings retro-header">
    <div class="retro-header-bg"></div>
    <h1 class="retro-title">
      <span class="retro-icon">⚙</span>
      <span class="retro-text">НАСТРОЙКИ</span>
      <span class="retro-blink">◆</span>
    </h1>
    <div class="header-actions retro-actions">
      <a href="index.html" class="header-button retro-btn retro-btn-back">
        <span class="btn-text">◄ НАЗАД</span>
      </a>
      <button id="save-button" class="header-button retro-btn retro-btn-save" aria-label="Сохранить настройки">
        <span class="btn-text">💾 SAVE</span>
      </button>
    </div>
  </header>

  <div class="settings-tabs retro-tabs">
    <button class="settings-tab-button retro-tab-btn active" data-target="tab-keywords">
      <span class="tab-icon">🔍</span>
      <span class="tab-text">КЛЮЧЕВЫЕ СЛОВА</span>
      <div class="tab-pixel-border"></div>
    </button>
    <button class="settings-tab-button retro-tab-btn" data-target="tab-channels">
      <span class="tab-icon">📡</span>
      <span class="tab-text">КАНАЛЫ</span>
      <div class="tab-pixel-border"></div>
    </button>
  </div>

  <main class="content retro-content">
    <div id="tab-keywords" class="settings-tab-content retro-panel active">
      <div class="retro-panel-border">
        <div class="retro-panel-header">
          <span class="panel-icon">📝</span>
          <span class="panel-title">CURRENT KEYWORDS</span>
        </div>
        <div class="current-keywords-container retro-keywords-display">
          <div id="current-keywords-tags" class="keywords-tags-container retro-tags">
            <div class="loading-indicator retro-loading">
              <span class="loading-text">ЗАГРУЗКА</span>
              <span class="loading-dots">...</span>
            </div>
          </div>
        </div>
      </div>
      
      <div class="retro-panel-border">
        <div class="retro-panel-header">
          <span class="panel-icon">➕</span>
          <span class="panel-title">ADD KEYWORD</span>
        </div>
        <div class="add-keyword-section retro-input-section">
          <div class="add-keyword-form retro-input-form">
            <input type="text" id="new-keyword-input" class="retro-input" placeholder="например: монтаж" maxlength="30">
            <button id="add-keyword-btn" class="retro-btn retro-btn-add" type="button">
              <span class="btn-text">ADD</span>
            </button>
          </div>
        </div>
      </div>
      
      <div class="retro-panel-border">
        <div class="retro-panel-header">
          <span class="panel-icon">✏️</span>
          <span class="panel-title">EDIT ALL</span>
        </div>
        <div class="settings-form retro-form">
          <textarea id="keywords-input" class="retro-textarea" rows="4" placeholder="монтаж, рилс, анимация..."></textarea>
        </div>
      </div>
    </div>

    <div id="tab-channels" class="settings-tab-content retro-panel">
      <div class="retro-panel-border">
        <div class="retro-panel-header">
          <span class="panel-icon">⬇️</span>
          <span class="panel-title">LOAD DEFAULTS</span>
        </div>
        <div class="retro-form">
          <button id="load-defaults-btn" class="retro-btn retro-btn-load">
            <span class="btn-text">📥 ЗАГРУЗИТЬ СТАНДАРТНЫЕ</span>
          </button>
        </div>
      </div>
      
      <div class="retro-panel-border">
        <div class="retro-panel-header">
          <span class="panel-icon">📡</span>
          <span class="panel-title">ADD CHANNEL</span>
        </div>
        <div class="retro-form">
          <div class="add-channel-form retro-input-form">
            <input type="text" id="channel-input" class="retro-input" placeholder="@username или https://t.me/..." aria-label="Адрес канала для добавления">
            <button id="add-channel-btn" class="retro-btn retro-btn-add" aria-label="Добавить канал">
              <span class="btn-text">ADD</span>
            </button>
          </div>
        </div>
      </div>
      
      <div class="retro-panel-border">
        <div class="retro-panel-header">
          <span class="panel-icon">📜</span>
          <span class="panel-title">CHANNELS LIST</span>
        </div>
        <div id="channels-list" class="channels-list retro-channels-list"></div>
      </div>
      
      <div class="retro-panel-border retro-danger-panel">
        <div class="retro-panel-header">
          <span class="panel-icon">⚠️</span>
          <span class="panel-title">DANGER ZONE</span>
        </div>
        <div class="retro-form">
          <button id="delete-all-btn" class="retro-btn retro-btn-danger">
            <span class="btn-text">🗑️ УДАЛИТЬ ВСЕ</span>
          </button>
        </div>
      </div>
    </div>
  </main>
  
  <div id="toast-container" class="toast-container"></div>

  <div id="custom-confirm-overlay" class="custom-confirm-overlay hidden">
    <div class="custom-confirm-box">
      <p id="custom-confirm-text"></p>
      <div class="custom-confirm-actions">
        <button id="confirm-btn-cancel" class="custom-confirm-button">Отмена</button>
        <button id="confirm-btn-ok" class="custom-confirm-button ok">OK</button>
      </div>
    </div>
  </div>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="config.js"></script>
  <script src="utils.min.js"></script>
  <script src="settings.js"></script>
</body>
</html>
