name: 🚀 Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Права для записи в GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Только один деплой одновременно
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    runs-on: ubuntu-latest
    
    steps:
    - name: 📁 Checkout
      uses: actions/checkout@v4

    - name: 🔧 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: 🔐 Inject Environment Variables
      run: |
        # Заменяем env-dev.js на production версию для всех HTML файлов
        cat > src/js/env-dev.js << 'EOF'
        // PRODUCTION: Переменные окружения из GitHub Secrets
        (function() {
          'use strict';
          
          // Устанавливаем production переменные
          window.ENV = {
            VITE_SUPABASE_URL: '${{ secrets.VITE_SUPABASE_URL }}',
            VITE_SUPABASE_ANON_KEY: '${{ secrets.VITE_SUPABASE_ANON_KEY }}',
            VITE_APP_ENVIRONMENT: 'production'
          };
          
          console.log('✅ Production environment variables loaded');
        })();
        EOF
        
        echo "✅ Environment variables injected successfully"
        echo "🔍 Checking secrets are not empty:"
        echo "SUPABASE_URL length: ${#VITE_SUPABASE_URL}"
        echo "SUPABASE_KEY length: ${#VITE_SUPABASE_ANON_KEY}"
      env:
        VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
        VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

    - name: 🧹 Clean sensitive data
      run: |
        # Удаляем .env файлы если есть
        rm -f .env .env.local .env.production
        
        # Убираем fallback значения из config.js для production
        echo "⚠️ Production build: fallback values removed from config.js"

    - name: 📄 Setup Pages
      uses: actions/configure-pages@v4

    - name: 📦 Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.'

    - name: 🚀 Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4

    - name: ✅ Deployment complete
      run: |
        echo "🎉 Deployment successful!"
        echo "🌐 URL: ${{ steps.deployment.outputs.page_url }}"