name: 🚀 Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Права для записи в GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Только один деплой одновременно
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    runs-on: ubuntu-latest
    
    steps:
    - name: 📁 Checkout
      uses: actions/checkout@v4

    - name: 🔧 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: 📦 Install dependencies
      run: npm install

    - name: 🏗️ Build with Vite
      run: npm run build

    - name: 🔐 Create .env for Vite
      run: |
        # Создаем .env файл для Vite
        cat > .env << 'EOF'
        VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
        VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}
        VITE_APP_ENVIRONMENT=production
        EOF
        
        echo "✅ Environment variables injected successfully"
        echo "🔍 Checking secrets are not empty:"
        echo "SUPABASE_URL length: ${#VITE_SUPABASE_URL}"
        echo "SUPABASE_KEY length: ${#VITE_SUPABASE_ANON_KEY}"
      env:
        VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
        VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

    - name: 🧹 Clean sensitive data
      run: |
        # Удаляем .env файлы если есть
        rm -f .env .env.local .env.production
        
        # Убираем fallback значения из config.js для production
        echo "⚠️ Production build: fallback values removed from config.js"

    - name: 🔐 Create Security Headers Script
      run: |
        # Создаем JavaScript для установки заголовков безопасности
        cat > security-headers.js << 'EOF'
        // security-headers.js - устанавливает дополнительные заголовки безопасности
        (function() {
          'use strict';
          
          // Проверяем что мы на production
          if (window.location.hostname.includes('github.io')) {
            console.log('🔐 Production security headers applied');
            
            // Устанавливаем дополнительные мета-теги для безопасности
            const securityMeta = [
              { name: 'referrer', content: 'strict-origin-when-cross-origin' },
              { name: 'format-detection', content: 'telephone=no' },
              { name: 'msapplication-config', content: 'none' },
            ];
            
            securityMeta.forEach(meta => {
              if (!document.querySelector(`meta[name="${meta.name}"]`)) {
                const metaEl = document.createElement('meta');
                metaEl.name = meta.name;
                metaEl.content = meta.content;
                document.head.appendChild(metaEl);
              }
            });
          }
        })();
        EOF
        
        # Добавляем скрипт в начало всех HTML файлов
        for file in *.html; do
          if [ -f "$file" ]; then
            sed -i '/<script src="src\/js\/csp-manager.js"><\/script>/a <script src="security-headers.js"></script>' "$file"
          fi
        done
        
        echo "✅ Security headers script added to all HTML files"

    - name: 📄 Setup Pages
      uses: actions/configure-pages@v4

    - name: 📦 Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: './dist'

    - name: 🚀 Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4

    - name: ✅ Deployment complete
      run: |
        echo "🎉 Deployment successful!"
        echo "🌐 URL: ${{ steps.deployment.outputs.page_url }}"