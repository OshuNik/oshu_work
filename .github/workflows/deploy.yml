name: 🚀 Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Права для записи в GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Только один деплой одновременно
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    runs-on: ubuntu-latest
    
    steps:
    - name: 📁 Checkout
      uses: actions/checkout@v4

    - name: 🔧 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: 📦 Clean install dependencies
      run: |
        # Удаляем старые кэши и файлы для чистой установки
        rm -rf node_modules
        rm -f package-lock.json
        
        # Чистая установка зависимостей
        npm install
        
        echo "✅ Dependencies installed successfully"

    - name: 🔐 Create .env for Vite
      run: |
        # Создаем .env файл для Vite ПЕРЕД сборкой
        echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" > .env
        echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> .env
        echo "VITE_APP_ENVIRONMENT=production" >> .env
        
        echo "✅ Environment variables injected successfully"
        echo "🔍 Created .env file with content:"
        cat .env | sed 's/eyJ.*$/[HIDDEN_TOKEN]/' # Скрываем секрет в логах
        
        if [ -z "${{ secrets.VITE_SUPABASE_URL }}" ]; then
          echo "❌ VITE_SUPABASE_URL is empty!"
          exit 1
        fi
        
        if [ -z "${{ secrets.VITE_SUPABASE_ANON_KEY }}" ]; then
          echo "❌ VITE_SUPABASE_ANON_KEY is empty!"
          exit 1
        fi

    - name: 🏗️ Build with Vite
      run: npm run build

    - name: 📁 Copy static JS files to dist
      run: |
        # Копируем src/ файлы в dist/ после Vite сборки
        cp -r src dist/
        
        echo "✅ Static JS files copied to dist/"

    - name: 🔐 Inject environment variables into built files
      run: |
        # Инжектируем переменные окружения в собранные HTML файлы
        cd dist
        
        # Создаем script с переменными окружения
        cat > env-injection.js << EOF
        window.ENV = {
          VITE_SUPABASE_URL: '${{ secrets.VITE_SUPABASE_URL }}',
          VITE_SUPABASE_ANON_KEY: '${{ secrets.VITE_SUPABASE_ANON_KEY }}',
          VITE_APP_ENVIRONMENT: 'production'
        };
        console.log('🔐 Production environment variables injected');
        EOF
        
        # Добавляем script в каждый HTML файл ПЕРЕД другими скриптами
        for file in *.html; do
          if [ -f "$file" ]; then
            sed -i '/<script src="src\/js\/csp-manager.js"><\/script>/i <script src="env-injection.js"></script>' "$file"
            echo "✅ Environment variables injected into $file"
          fi
        done
        
        echo "🎯 Environment injection completed"

    - name: 🧹 Clean sensitive data
      run: |
        # Удаляем .env файлы если есть
        rm -f .env .env.local .env.production
        
        echo "⚠️ Production build: fallback values removed from source"

    - name: 🔐 Create Security Headers Script
      run: |
        # Создаем JavaScript для установки заголовков безопасности
        cat > ./dist/security-headers.js << 'EOF'
        // security-headers.js - устанавливает дополнительные заголовки безопасности
        (function() {
          'use strict';
          
          // Проверяем что мы на production
          if (window.location.hostname.includes('github.io')) {
            console.log('🔐 Production security headers applied');
            
            // Устанавливаем дополнительные мета-теги для безопасности
            const securityMeta = [
              { name: 'referrer', content: 'strict-origin-when-cross-origin' },
              { name: 'format-detection', content: 'telephone=no' },
              { name: 'msapplication-config', content: 'none' },
            ];
            
            securityMeta.forEach(meta => {
              if (!document.querySelector(`meta[name="${meta.name}"]`)) {
                const metaEl = document.createElement('meta');
                metaEl.name = meta.name;
                metaEl.content = meta.content;
                document.head.appendChild(metaEl);
              }
            });
          }
        })();
        EOF
        
        # Добавляем скрипт в HTML файлы в dist папке
        cd dist
        for file in *.html; do
          if [ -f "$file" ]; then
            sed -i '/<script src="src\/js\/csp-manager.js"><\/script>/a <script src="security-headers.js"></script>' "$file"
          fi
        done
        cd ..
        
        echo "✅ Security headers script added to all HTML files in dist"

    - name: 📄 Setup Pages
      uses: actions/configure-pages@v4

    - name: 📦 Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: './dist'

    - name: 🚀 Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4

    - name: ✅ Deployment complete
      run: |
        echo "🎉 Deployment successful!"
        echo "🌐 URL: ${{ steps.deployment.outputs.page_url }}"