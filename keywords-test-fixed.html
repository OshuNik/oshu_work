<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keywords Tab - Исправленный дизайн</title>
  <style>
    :root {
      --background-color: #F0F0F0;
      --card-color: #FFFFFF;
      --text-color: #000000;
      --hint-color: #666666;
      --border-color: #000000;
      --accent-blue: #41A6FF;
      --accent-green: #6BCB77;
      --accent-red: #FF5C5C;
      --accent-yellow: #FFD93D;
      --box-shadow: 4px 4px 0px #000000;
      --box-shadow-pressed: 2px 2px 0px #000000;
      --font-pixel: 'Press Start 2P', monospace;
      --font-mono: 'Roboto Mono', monospace;
      --border-width: 3px;
      --transition-normal: 0.2s ease;
    }

    body {
      font-family: var(--font-mono);
      background-color: var(--background-color);
      margin: 0;
      padding: 20px;
    }

    .keywords-section {
      max-width: 800px;
      margin: 0 auto;
    }

    .keywords-header-card {
      background: var(--accent-blue);
      border: var(--border-width) solid var(--border-color);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: var(--box-shadow);
    }

    .keywords-window-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
    }

    .keywords-window-title {
      font-family: var(--font-pixel);
      font-size: 24px;
      font-weight: 700;
      color: white;
      text-shadow: 2px 2px 0px rgba(0, 0, 0, 0.5);
      letter-spacing: 2px;
    }

    .pixel-counter {
      display: flex;
      align-items: center;
      gap: 12px;
      font-family: var(--font-pixel);
      font-size: 16px;
      font-weight: 700;
    }

    .pixel-counter .pixel-bar {
      color: #FFD93D;
      font-size: 18px;
      letter-spacing: 2px;
      text-shadow: 1px 1px 0px rgba(0, 0, 0, 0.3);
      animation: pixelPulse 3s infinite ease-in-out;
    }

    .pixel-counter .favorites-count {
      background: #FF6B6B;
      color: white;
      padding: 6px 12px;
      border: 3px solid #000;
      border-radius: 6px;
      font-size: 18px;
      font-weight: 700;
      text-shadow: 2px 2px 0px rgba(0, 0, 0, 0.5);
      box-shadow: 4px 4px 0px #000;
    }

    @keyframes pixelPulse {
      0%, 100% { 
        color: var(--accent-green);
        transform: scale(1);
      }
      50% { 
        color: var(--accent-blue);
        transform: scale(1.1);
      }
    }

    .keywords-add-card {
      background: var(--card-color);
      border: var(--border-width) solid var(--border-color);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: var(--box-shadow);
    }

    .keywords-section-subtitle {
      font-family: var(--font-pixel);
      font-size: 16px;
      font-weight: 700;
      color: var(--text-color);
      margin: 0 0 15px 0;
      letter-spacing: 1px;
    }

    .keywords-section-description {
      font-family: var(--font-mono);
      font-size: 14px;
      color: var(--text-color);
      margin-bottom: 15px;
      font-weight: 500;
    }

    .keywords-input-container {
      display: flex;
      gap: 8px;
      margin-bottom: 15px;
      align-items: center;
    }

    .keywords-input-wrapper {
      flex: 1;
      position: relative;
    }

    .keywords-input-field {
      width: 100%;
      padding: 15px;
      border: 4px solid var(--border-color);
      border-radius: 8px;
      font-family: var(--font-mono);
      font-size: 14px;
      background: var(--card-color);
      box-shadow: var(--box-shadow);
      transition: all 0.2s ease;
      box-sizing: border-box;
    }

    .keywords-input-field:focus {
      outline: none;
      border-color: var(--accent-blue);
      box-shadow: 4px 4px 0px var(--accent-blue);
    }

    .keywords-clear-button {
      position: absolute;
      top: 50%;
      right: 8px;
      transform: translateY(-50%);
      width: 30px;
      height: 30px;
      border: none;
      background: transparent;
      cursor: pointer;
      padding: 0;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.2s, visibility 0.2s;
      z-index: 10;
    }

    .keywords-clear-button::before,
    .keywords-clear-button::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 18px;
      height: var(--border-width);
      background-color: var(--hint-color);
      border-radius: 2px;
    }

    .keywords-clear-button::before { transform: translate(-50%, -50%) rotate(45deg); }
    .keywords-clear-button::after { transform: translate(-50%, -50%) rotate(-45deg); }

    .keywords-input-wrapper.has-text .keywords-clear-button {
      opacity: 1;
      visibility: visible;
    }

    .keywords-clear-button:hover::before,
    .keywords-clear-button:hover::after {
      background-color: var(--text-color);
    }

    .keywords-clear-button:active::before,
    .keywords-clear-button:active::after {
      background-color: var(--accent-red);
    }

    .keywords-add-button {
      background: var(--accent-blue);
      color: white;
      border: 4px solid var(--accent-blue);
      border-radius: 8px;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: var(--box-shadow);
      transition: all 0.2s ease;
      flex-shrink: 0;
    }

    .keywords-add-button:hover {
      transform: translateY(-2px);
      box-shadow: 6px 6px 0px var(--border-color);
    }

    .keywords-add-button:active {
      transform: translateY(0px);
      box-shadow: var(--box-shadow-pressed);
    }

    .keywords-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 15px;
    }

    .keywords-action-btn {
      font-family: var(--font-pixel);
      font-size: 12px;
      font-weight: 700;
      padding: 12px 20px;
      border: 4px solid var(--border-color);
      border-radius: 8px;
      background: var(--card-color);
      color: var(--text-color);
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      box-shadow: var(--box-shadow);
      transition: all 0.2s ease;
    }

    .keywords-action-btn:hover {
      transform: translateY(-2px);
      box-shadow: 6px 6px 0px var(--border-color);
    }

    .keywords-active-card {
      background: var(--card-color);
      border: var(--border-width) solid var(--border-color);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: var(--box-shadow);
    }

    .keywords-tags-container {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin: 20px 0;
      min-height: 60px;
      align-items: flex-start;
    }

    .keyword-tag {
      background: var(--accent-yellow);
      border: 3px solid var(--border-color);
      border-radius: 8px;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-mono);
      font-size: 14px;
      font-weight: 600;
      color: var(--text-color);
      box-shadow: var(--box-shadow);
      transition: all 0.2s ease;
      cursor: pointer;
      margin: 6px;
    }

    .keyword-tag:hover {
      transform: translateY(-2px);
      box-shadow: 6px 6px 0px var(--border-color);
    }

    .keyword-tag:active {
      transform: translateY(0px);
      box-shadow: var(--box-shadow-pressed);
    }

    .keyword-tag .keyword-tag-remove {
      width: 20px;
      height: 20px;
      border: none;
      background: transparent;
      cursor: pointer;
      padding: 0;
      position: relative;
      flex-shrink: 0;
    }

    .keyword-tag .keyword-tag-remove::before,
    .keyword-tag .keyword-tag-remove::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 14px;
      height: 2px;
      background-color: var(--accent-red);
      border-radius: 1px;
    }

    .keyword-tag .keyword-tag-remove::before { transform: translate(-50%, -50%) rotate(45deg); }
    .keyword-tag .keyword-tag-remove::after { transform: translate(-50%, -50%) rotate(-45deg); }

    .keyword-tag .keyword-tag-remove:hover::before,
    .keyword-tag .keyword-tag-remove:hover::after {
      background-color: var(--text-color);
    }

    .keywords-preset-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 15px;
    }

    .keywords-action-success {
      background: var(--accent-green) !important;
      color: white !important;
      border-color: var(--accent-green) !important;
    }

    .keywords-action-danger {
      background: var(--accent-red) !important;
      color: white !important;
      border-color: var(--accent-red) !important;
    }
  </style>
</head>
<body>
  <div class="keywords-section">
    <!-- 1. КЛЮЧЕВЫЕ СЛОВА (заголовок окна) -->
    <div class="keywords-header-card">
      <div class="keywords-window-header">
        <span class="keywords-window-title">КЛЮЧЕВЫЕ СЛОВА</span>
        <div class="pixel-counter">
          <span class="pixel-bar">■■■</span>
          <span class="favorites-count">3</span>
          <span class="pixel-bar">■■■</span>
        </div>
      </div>
    </div>

    <!-- 2. ДОБАВИТЬ -->
    <div class="keywords-add-card">
      <h3 class="keywords-section-subtitle">ДОБАВИТЬ</h3>
      
      <!-- 3. Одно слово или несколько через запятую: -->
      <p class="keywords-section-description">Одно слово или несколько через запятую:</p>
      
      <!-- 4. Окно ввода -->
      <div class="keywords-input-container">
        <div class="keywords-input-wrapper has-text">
          <input type="text" class="keywords-input-field" placeholder="Введите ключевые слова..." id="new-keyword-input" value="JavaScript, React, Node.js">
          <button id="keywords-clear-button" class="keywords-clear-button" aria-label="Очистить"></button>
        </div>
        <button id="add-keyword-btn" class="keywords-add-button">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 5v14M5 12h14"/>
          </svg>
        </button>
      </div>
      
      <!-- 5. Кнопки действий -->
      <div class="keywords-actions">
        <button id="load-presets-btn" class="keywords-action-btn keywords-action-success">Загрузить пресет</button>
      </div>
    </div>

    <!-- 5. АКТИВНЫЕ КЛЮЧЕВЫЕ СЛОВА: -->
    <div class="keywords-active-card">
      <h3 class="keywords-section-subtitle">АКТИВНЫЕ КЛЮЧЕВЫЕ СЛОВА:</h3>
      
      <!-- 6. Ключевые слова -->
      <div class="keywords-tags-container" id="current-keywords-tags">
        <div class="keyword-tag">
          <span>JavaScript</span>
          <button class="keyword-tag-remove" title="Удалить"></button>
        </div>
        <div class="keyword-tag">
          <span>React</span>
          <button class="keyword-tag-remove" title="Удалить"></button>
        </div>
        <div class="keyword-tag">
          <span>Node.js</span>
          <button class="keyword-tag-remove" title="Удалить"></button>
        </div>
      </div>
      
      <!-- Действия с пресетами -->
      <div class="keywords-preset-actions">
        <button id="save-as-preset-btn" class="keywords-action-btn keywords-action-success">Сохранить как пресет</button>
        <button id="clear-all-keywords-btn" class="keywords-action-btn keywords-action-danger">Удалить все</button>
      </div>
    </div>
  </div>

  <script>
    // Тестовый скрипт для демонстрации функциональности
    const newKeywordInput = document.getElementById('new-keyword-input');
    const keywordsClearBtn = document.getElementById('keywords-clear-button');
    const keywordsInputWrapper = document.querySelector('.keywords-input-wrapper');

    // Функция обновления состояния крестика
    function updateKeywordsInputState() {
      if (keywordsInputWrapper && newKeywordInput) {
        const hasText = newKeywordInput.value.length > 0;
        keywordsInputWrapper.classList.toggle('has-text', hasText);
      }
    }

    // Обработчик для кнопки очистки
    if (keywordsClearBtn) {
      keywordsClearBtn.addEventListener('click', () => {
        if (newKeywordInput) {
          newKeywordInput.value = '';
          newKeywordInput.focus();
          updateKeywordsInputState();
        }
      });
    }

    // Обработчики для обновления состояния крестика
    if (newKeywordInput) {
      newKeywordInput.addEventListener('input', updateKeywordsInputState);
      newKeywordInput.addEventListener('focus', updateKeywordsInputState);
    }

    // Инициализация состояния
    updateKeywordsInputState();
  </script>
</body>
</html>
